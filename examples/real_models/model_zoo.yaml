# Verified (student, base) pairings for the real-model triage demo.
# IMPORTANT: a wrong base silently produces meaningless `lift`. Two safeguards:
#   (1) pin the HF revision SHA for every model (`student_rev`/`base_rev` below, resolved 2026-06-17;
#       these are also in `../../model_revisions.py`, so the tool loads them pinned), and
#   (2) the tool asserts identical student/base tokenizer vocab at load (a mismatch aborts the run).
# `tied: true` => scan + classify run, but scrub refuses via the arch-guard (the input embedding is
# shared, so editing the output row is unsafe). NB: arch_guard checks the STUDENT's head, not the base's --
# a distilled student can UNTIE a head its base tied, so confirm `tie_word_embeddings` from the STUDENT's
# config (or just run `doctor`), never from an assumption about the base.

models:
  - student: deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B
    base:    Qwen/Qwen2.5-Math-1.5B        # DeepSeek R1 card: 1.5B distill is built on Qwen2.5-Math-1.5B
    tied:    false                         # base Qwen2.5-Math ties embeddings, but the R1 distill UNTIED the
                                           # head (tie_word_embeddings=false) -> scrub RUNS. arch_guard checks
                                           # the STUDENT. Verified: clean scrub, perplexity ratio 0.9999.
    student_rev: ad9f0ae0864d7fbcd1cd905e3c6c5b069cc8b562
    base_rev:    4a83ca6e4526a4f2da3aa259ec36c259f66b2ab2
    note:    quickstart pair (smallest); fp32 ~6GB; <10 min scan+classify+scrub (untied student head)

  - student: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
    base:    Qwen/Qwen2.5-Math-7B
    tied:    false                         # 7B Qwen untied -> scrub demo candidate (verify config)
    student_rev: 916b56a44061fd5cd7d6a8fb632557ed4f724f60
    base_rev:    b101308fe89651ea5ce025f25317fea6fc07e96e
    note:    fp32 ~28GB inference; scan+classify+scrub demo

  - student: deepseek-ai/DeepSeek-R1-Distill-Llama-8B
    base:    meta-llama/Llama-3.1-8B
    tied:    false                         # Llama-3.1-8B untied -> scrub demo candidate (verify config)
    student_rev: 6a6f4aa4197940add57724a7707d069478df56b1
    base_rev:    d04e592bb4f6aa9cfee91e2e20afa771667e1d4b
    note:    fp32 ~32GB inference; non-Qwen family contrast; Pillar-1 carrier-geometry + bf16/fp32

  - student: Qwen/Qwen3-0.6B
    base:    Qwen/Qwen3-0.6B-Base
    tied:    true                          # both tie_word_embeddings=true (student AND base) -> scrub REFUSE;
                                           # the arch-guard refusal demo. Verified: doctor -> scrub REFUSE.
    student_rev: c1899de289a04d12100db370d81485cdf75e47ca
    base_rev:    da87bfb608c14b7cf20ba1ce41287e8de496c0cd
    note:    arch-guard refusal demo (genuinely tied student); small + cached; scan+classify only

# All pairings must be CONFIRMED at run time (revision SHA + tokenizer-vocab assert + tie check).
# Do not publish a per-model result without that confirmation.
